<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.fusobraandfrance.com</title>
    <link rel="stylesheet" href="ex4_3.css">
</head>

<body>
    <h1>Programa Fuso Horário</h1>
    <img src="./img/download.jpg" alt="mundo">
    <form>
        <p>Hora no Brasil:
            <input type="number" id="inHorabrasil" min="0" max="23.59" step="0.01" required>
            <!-- min = "valor minimo"-->
            <!--max="valor maximo"-->
            <!--step = "significa que pode digitar 2 casas decimais"-->
            <!--required = "campo obrigatorio, so passa para a proxima etapa apos digitar"-->
        </p>
        <input type="submit" value="Exibir hora na frança" required>
    </form>
    <h3></h3>
    <script src="./ex4_3.js"></script>

</body>

</html>
